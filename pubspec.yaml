name: flutter_staggered_animations_plus
description: >
  Easily add staggered animations to your ListView, GridView, Column and Row
  children. A modernized fork of flutter_staggered_animations with Dart 3+ and
  Flutter 3.x support.
version: 1.0.2

repository: https://github.com/OmerJahangir/flutter_staggered_animations_plus
issue_tracker: https://github.com/OmerJahangir/flutter_staggered_animations_plus/issues

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"

platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

assets:
  - path: assets/column_demo.gif
    description: Animation on column demo
  - path: assets/gridview_demo.gif
    description: Animation on gridview demo
  - path: assets/listview_demo.gif
    description: Animation on listview demo
